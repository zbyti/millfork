[compilation]
arch=w65c02
encoding=petscii
screen_encoding=petscr
modules=x65_hardware,default_panic

[allocation]
zp_bytes=$0-$ff
segment_default_start=$200
segment_default_end=$fbff

[define]
X65=1
WIDESCREEN=1
KEYBOARD=1
JOYSTICKS=2
HAS_BITMAP_MODE=1

[output]
style=single
format=$FF,$FF,startaddr,endaddr,allocated,$E0,$FF,$FF,$FF,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,$00,addr:vbl,startaddr,$00,$00
extension=xex
